<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d1ff"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#050d1a" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield -->
  <path d="M8,6 L88,6 L88,54 Q88,82 48,92 Q8,82 8,54 Z" fill="url(#bg)"/>
  <path d="M8,6 L88,6 L88,54 Q88,82 48,92 Q8,82 8,54 Z"
        fill="none" stroke="url(#g)" stroke-width="2.5" filter="url(#gl)"/>
  <path d="M14,12 L82,12 L82,54 Q82,78 48,88 Q14,78 14,54 Z"
        fill="none" stroke="url(#g)" stroke-width="0.6" opacity="0.2"/>

  <!-- CPU chip -->
  <rect x="28" y="30" width="40" height="40" rx="4" fill="none" stroke="url(#g)" stroke-width="2" filter="url(#gl)"/>
  <rect x="35" y="37" width="26" height="26" rx="2" fill="url(#g)" fill-opacity="0.07" stroke="url(#g)" stroke-width="0.8" opacity="0.5"/>

  <!-- Center core -->
  <circle cx="48" cy="50" r="5" fill="url(#g)" filter="url(#gc)"/>

  <!-- Corner dots -->
  <circle cx="38" cy="40" r="1.8" fill="url(#g)" filter="url(#gl)"/>
  <circle cx="58" cy="40" r="1.8" fill="url(#g)" filter="url(#gl)"/>
  <circle cx="38" cy="60" r="1.8" fill="url(#g)" filter="url(#gl)"/>
  <circle cx="58" cy="60" r="1.8" fill="url(#g)" filter="url(#gl)"/>

  <!-- LEFT pins -->
  <line x1="28" y1="36" x2="18" y2="36" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="28" y1="44" x2="18" y2="44" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="28" y1="50" x2="18" y2="50" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="28" y1="56" x2="18" y2="56" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="28" y1="64" x2="18" y2="64" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>

  <!-- RIGHT pins -->
  <line x1="68" y1="36" x2="78" y2="36" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="68" y1="44" x2="78" y2="44" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="68" y1="50" x2="78" y2="50" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="68" y1="56" x2="78" y2="56" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="68" y1="64" x2="78" y2="64" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>

  <!-- TOP pins -->
  <line x1="35" y1="30" x2="35" y2="20" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="42" y1="30" x2="42" y2="20" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="48" y1="30" x2="48" y2="20" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="54" y1="30" x2="54" y2="20" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="61" y1="30" x2="61" y2="20" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>

  <!-- BOTTOM pins -->
  <line x1="35" y1="70" x2="35" y2="80" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="42" y1="70" x2="42" y2="80" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="48" y1="70" x2="48" y2="80" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="54" y1="70" x2="54" y2="80" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="61" y1="70" x2="61" y2="80" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" filter="url(#gl)"/>
</svg>
