
<div style="display: flex; justify-content: center; align-items: flex-start; padding: 2rem 1rem;">
  <div style="width: 360px; background: var(--color-background-secondary); border-radius: 32px; border: 0.5px solid var(--color-border-tertiary); overflow: hidden; padding: 0 0 2rem;">

    <!-- Header bleu foncé -->
    <div style="background: #0C447C; padding: 2.5rem 1.5rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <!-- Logo SECUPRO -->
      <div style="width: 72px; height: 72px; border-radius: 16px; background: white; display: flex; align-items: center; justify-content: center;">
        <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <!-- Bouclier -->
          <path d="M24 4 L40 11 L40 26 C40 35 32 42 24 45 C16 42 8 35 8 26 L8 11 Z" fill="#0C447C" stroke="#185FA5" stroke-width="1.5"/>
          <!-- S stylisé -->
          <text x="24" y="32" text-anchor="middle" font-family="Arial" font-weight="700" font-size="20" fill="white">S</text>
        </svg>
      </div>
      <div style="text-align: center;">
        <p style="color: white; font-size: 20px; font-weight: 500; margin: 0; letter-spacing: 2px;">SECUPRO</p>
        <p style="color: #85B7EB; font-size: 12px; margin: 4px 0 0; letter-spacing: 1px;">Espace agent</p>
      </div>
    </div>

    <!-- Formulaire -->
    <div style="padding: 1.75rem 1.5rem 0;">
      <p style="font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.5rem;">Connexion</p>

      <!-- Email -->
      <div style="margin-bottom: 1rem;">
        <label style="font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Adresse e-mail</label>
        <div style="display: flex; align-items: center; gap: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 12px; height: 44px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          <span style="font-size: 14px; color: var(--color-text-tertiary);">agent@secupro.fr</span>
        </div>
      </div>

      <!-- Mot de passe -->
      <div style="margin-bottom: 0.5rem;">
        <label style="font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Mot de passe</label>
        <div style="display: flex; align-items: center; gap: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 12px; height: 44px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span style="font-size: 14px; color: var(--color-text-tertiary); letter-spacing: 3px;">••••••••</span>
        </div>
      </div>

      <!-- Mot de passe oublié -->
      <div style="text-align: right; margin-bottom: 1.5rem;">
        <span style="font-size: 12px; color: #185FA5; cursor: pointer;">Mot de passe oublié ?</span>
      </div>

      <!-- Bouton connexion -->
      <div style="background: #0C447C; border-radius: var(--border-radius-md); height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 1rem;">
        <span style="color: white; font-size: 15px; font-weight: 500;">Se connecter</span>
      </div>

      <!-- Séparateur -->
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
        <div style="flex: 1; height: 0.5px; background: var(--color-border-tertiary);"></div>
        <span style="font-size: 12px; color: var(--color-text-tertiary);">ou</span>
        <div style="flex: 1; height: 0.5px; background: var(--color-border-tertiary);"></div>
      </div>

      <!-- Créer un compte -->
      <div style="border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <span style="font-size: 14px; color: var(--color-text-primary);">Créer un compte</span>
      </div>
    </div>

  </div>
</div>
